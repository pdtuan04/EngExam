services:
  engexam:
    image: ${DOCKER_REGISTRY-}engexam
    container_name: engexam
    build:
      context: .
      dockerfile: EngExam/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:8080
        - ConnectionStrings__EngExamConnection=Server=sqlserver;Database=EngExam;User Id=SA;Password=111AAAa@;Encrypt=False;TrustServerCertificate=True;
        - ConnectionStrings__RedisCache=redis:6379
    volumes:
        - images_data:/app/wwwroot/uploads/images
    networks:
      - engexam-network
    restart: always

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    restart: always
    environment:
      MSSQL_SA_PASSWORD: "111AAAa@"
      ACCEPT_EULA: "Y"
    healthcheck:
        test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '111AAAa@' -C -Q 'SELECT 1' || exit 1"]
        retries: 5
        interval: 10s
        timeout: 3s
        start_period: 60s
    volumes:
        - sql_data:/var/opt/mssql
    networks:
        - engexam-network
  redis:
    image: redis:latest
    container_name: redisserver
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - engexam-network
volumes:
  sql_data:
  redis_data:
  images_data:
networks:
  engexam-network:
    driver: bridge